name: Update Kodi RSS

on:
  workflow_dispatch:
  schedule:
    # Swedish local time. Minute 17 reduces the risk of queues on the hour.
    - cron: "17 8,20 * * *"
      timezone: "Europe/Stockholm"

permissions:
  contents: write

concurrency:
  group: update-kodi-rss
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Generate RSS feed
        run: python scripts/generate_feed.py

      - name: Commit updated RSS feed
        shell: bash
        run: |
          if git diff --quiet -- docs/releases.xml; then
            echo "The RSS feed is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases.xml
          git commit -m "Update Kodi RSS"
          git push
